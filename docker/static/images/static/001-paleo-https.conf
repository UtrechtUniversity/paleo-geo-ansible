# TLS vhost — serves the static site.
<VirtualHost *:443>
    ServerName PALEO_HOST
    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile    /etc/apache2/certs/paleo.pem
    SSLCertificateKeyFile /etc/apache2/certs/paleo.key

    # TLS
    SSLProtocol           -all +TLSv1.2 +TLSv1.3
    SSLHonorCipherOrder   on
    SSLCipherSuite        ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384

    # HSTS — only safe behind a real cert. In dev (self-signed) browsers
    # may persist this header; clear it via Site Settings if needed.
    Header always set Strict-Transport-Security "max-age=63072000"

    <Directory /var/www/html>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
