---
# copyright Utrecht University
# On-demand restore (disaster recovery, same host) of a Paleo site.
#
#   ansible-playbook restore.yml -e site=wordpress -e backup=/home/paleo/paleo-backups/wordpress/<file>.tar.gz
#   ansible-playbook restore.yml -e site=static    -e backup=/home/paleo/paleo-backups/static/<file>.tar.gz
#
# This OVERWRITES the live site. restore.sh runs with --force

- name: Validate arguments
  hosts: localhost
  gather_facts: false
  tasks:
    # Require an explicit site — no silent default. A rarely-exercised default
    # path rots (it once hid a recursive-var bug); explicit is self-documenting.
    - name: Require a valid site
      ansible.builtin.assert:
        that:
          - site is defined
          - site in ['wordpress', 'static']
        msg: "Pass -e site=wordpress or -e site=static"

    - name: Require a backup path
      ansible.builtin.assert:
        that:
          - backup is defined
          - backup | length > 0
        msg: "Pass -e backup=/path/to/backup.tar.gz"

- name: On-demand Paleo restore
  # default('') is only for syntax-check/templating; the validate play above
  # guarantees a real site before this play runs.
  hosts: "{{ site | default('') }}_sites"
  become: true
  vars:
    paleo_user: paleo
  tasks:
    - name: Run restore.sh as the paleo user
      ansible.builtin.command:
        cmd: >-
          ./restore.sh --backup {{ backup }} --force
        chdir: "/home/{{ paleo_user }}/paleo-ansible/docker/{{ site }}"
      become_user: "{{ paleo_user }}"
      register: paleo_restore_out
      changed_when: true

    - name: Show restore output
      ansible.builtin.debug:
        var: paleo_restore_out.stdout_lines
