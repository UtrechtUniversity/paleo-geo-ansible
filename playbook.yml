---
# copyright Utrecht University
# This playbook deploys all Paleo sites on the target VM.

# Derived from Matomo
- name: Local checks
  hosts: localhost
  gather_facts: false
  pre_tasks:
    - name: Verify Ansible version meets requirements
      ansible.builtin.assert:
        that: "ansible_version.full is version('2.11', '>=')"
        msg: "You must update Ansible to at least 2.11 to deploy Paleo."

- name: Provision Paleo WordPress site
  hosts: wordpress_sites
  become: true
  roles:
    - common
    - docker_compose
    - paleo_wordpress
    - role: paleo_backup
      paleo_backup_kind: wordpress
      paleo_backup_unit: paleo-backup
      paleo_backup_after_service: paleo-wp.service

- name: Provision Paleo static site
  hosts: static_sites
  become: true
  roles:
    - common
    - docker_compose
    - paleo_static
    - role: paleo_backup
      paleo_backup_kind: static
      paleo_backup_unit: paleo-static-backup
      paleo_backup_after_service: paleo-static.service
