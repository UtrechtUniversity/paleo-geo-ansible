---
# copyright Utrecht University

volumes:
  paleo_wp_db_data:
  # paleo_wp_html holds the full WordPress install. The official wordpress
  # image populates it on first boot and writes wp-config.php here.
  # Mounted to the VM path at /var/lib/docker/volumes/
  paleo_wp_html:
  paleo_wp_apache_certs:

services:

  database:
    container_name: paleo-wp-database
    image: mariadb:11.4
    restart: always
    volumes:
      - paleo_wp_db_data:/var/lib/mysql:Z
    environment:
      - MARIADB_AUTO_UPGRADE=1
      - MARIADB_DATABASE=wordpress
      - MARIADB_DISABLE_UPGRADE_BACKUP=1
      - MARIADB_INITDB_SKIP_TZINFO=1
      - MARIADB_USER=wordpress
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}

  wordpress:
    container_name: paleo-wp
    image: paleo-wordpress:latest
    build:
      context: ./images/wordpress
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - database
    ports:
      - "${PALEO_HOST_IP}:80:80"
      - "${PALEO_HOST_IP}:${PALEO_HOST_PORT}:443"
    sysctls:
      net.ipv4.ip_unprivileged_port_start: 0
    volumes:
      # Shared with wp-installer, so use :z (shared SELinux label), not :Z.
      - paleo_wp_html:/var/www/html:z
      - paleo_wp_apache_certs:/etc/apache2/certs:Z
      - ./import-certificates:/etc/import-certificates
    environment:
      # Consumed by paleo-init.sh (vhost hostname substitution + TLS).
      - PALEO_HOST=${PALEO_HOST}
      # Consumed by the official entrypoint to generate wp-config.php.
      - WORDPRESS_DB_HOST=database
      - WORDPRESS_DB_NAME=wordpress
      - WORDPRESS_DB_USER=wordpress
      - WORDPRESS_DB_PASSWORD=${MARIADB_PASSWORD}
      - WORDPRESS_TABLE_PREFIX=wp_

  # One-shot first-run installer. 
  wp-installer:
    container_name: paleo-wp-installer
    image: wordpress:cli-php8.3
    restart: "no"
    depends_on:
      - database
      - wordpress
    volumes:
      # Same html volume as the wordpress service — shared label (:z).
      - paleo_wp_html:/var/www/html:z
    environment:
      # The shared wp-config.php reads DB settings at runtime via getenv, so
      # the installer needs the same DB vars as the wordpress service —
      # otherwise it falls back to the image default host (e.g, 'mysql').
      - WORDPRESS_DB_HOST=database
      - WORDPRESS_DB_NAME=wordpress
      - WORDPRESS_DB_USER=wordpress
      - WORDPRESS_DB_PASSWORD=${MARIADB_PASSWORD}
      - PALEO_HOST=${PALEO_HOST}
      - PALEO_FIRST_SITE_TITLE=${PALEO_FIRST_SITE_TITLE}
      - PALEO_FIRST_USER_NAME=${PALEO_FIRST_USER_NAME}
      - PALEO_FIRST_USER_EMAIL=${PALEO_FIRST_USER_EMAIL}
      - PALEO_FIRST_USER_PASSWORD=${PALEO_FIRST_USER_PASSWORD}
    entrypoint: ["/bin/sh", "-c"]
    # $$VAR escapes
    command:
      - |
        echo "Installer: waiting for wp-config.php from the wordpress service..."
        until [ -f /var/www/html/wp-config.php ]; do sleep 3; done
        echo "Installer: ensuring WordPress is installed..."
        until wp core is-installed --path=/var/www/html 2>/dev/null || \
              wp core install --path=/var/www/html \
                --url="https://$$PALEO_HOST" \
                --title="$$PALEO_FIRST_SITE_TITLE" \
                --admin_user="$$PALEO_FIRST_USER_NAME" \
                --admin_email="$$PALEO_FIRST_USER_EMAIL" \
                --admin_password="$$PALEO_FIRST_USER_PASSWORD" \
                --skip-email; do
          echo "Installer: database not ready yet, retrying..."
          sleep 3
        done
        echo "Installer: WordPress is installed."
