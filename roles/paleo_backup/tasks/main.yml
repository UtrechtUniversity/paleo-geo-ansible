---
# copyright Utrecht University

# paleo_backup role — schedules on-VM backups of a site's stack
# This role only installs the systemd timer that runs them.
# Systemd timer replaces cron (due to its silent failures)

- name: Ensure the backup destination directory exists
  ansible.builtin.file:
    path: "{{ paleo_backup_root }}/{{ paleo_backup_kind }}"
    state: directory
    owner: "{{ paleo_user }}"
    group: "{{ paleo_user }}"
    mode: '0750'

- name: Install backup .service systemd unit
  ansible.builtin.template:
    src: paleo-backup.service.j2
    dest: "/etc/systemd/system/{{ paleo_backup_unit }}.service"
    owner: root
    group: root
    mode: '0644'

- name: Install backup .timer systemd unit
  ansible.builtin.template:
    src: paleo-backup.timer.j2
    dest: "/etc/systemd/system/{{ paleo_backup_unit }}.timer"
    owner: root
    group: root
    mode: '0644'

- name: Enable and start the backup timer
  ansible.builtin.systemd:
    name: "{{ paleo_backup_unit }}.timer"
    enabled: "{{ paleo_backup_schedule_enabled }}"
    state: "{{ 'started' if paleo_backup_schedule_enabled else 'stopped' }}"
    daemon_reload: true
