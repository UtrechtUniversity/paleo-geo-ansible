---
# copyright Utrecht University

# paleo_static role — deploys a static-site Apache stack to a single host.

- name: Ensure paleo group exists
  ansible.builtin.group:
    name: "{{ paleo_user }}"

- name: Ensure paleo user exists and is in the docker group
  ansible.builtin.user:
    name: "{{ paleo_user }}"
    group: "{{ paleo_user }}"
    groups: docker
    create_home: true

- name: Ensure paleo-ansible/docker/static directory exists on the target
  ansible.builtin.file:
    path: "/home/{{ paleo_user }}/paleo-ansible/docker/static"
    state: directory
    owner: "{{ paleo_user }}"
    group: "{{ paleo_user }}"
    mode: '0755'

# MVP shortcut: copy the docker/static/ tree from the Ansible controller.
- name: Copy docker/static assets to the target
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/docker/static/"
    dest: "/home/{{ paleo_user }}/paleo-ansible/docker/static/"
    owner: "{{ paleo_user }}"
    group: "{{ paleo_user }}"
    mode: preserve

- name: Validate paleo_cert_mode
  ansible.builtin.fail:
    msg: "paleo_cert_mode must be 'selfsigned' or 'static'"
  when: paleo_cert_mode not in ["selfsigned", "static"]

- name: Upload static TLS certificate
  ansible.builtin.copy:
    dest: "/home/{{ paleo_user }}/paleo-ansible/docker/static/import-certificates/paleo.pem"
    content: "{{ paleo_static_cert }}"
    owner: "{{ paleo_user }}"
    group: "{{ paleo_user }}"
    mode: '0644'
  when: paleo_cert_mode == "static"

- name: Upload static TLS certificate key
  ansible.builtin.copy:
    dest: "/home/{{ paleo_user }}/paleo-ansible/docker/static/import-certificates/paleo.key"
    content: "{{ paleo_static_cert_key }}"
    owner: "{{ paleo_user }}"
    group: "{{ paleo_user }}"
    mode: '0600'
  when: paleo_cert_mode == "static"

- name: Template Docker Compose .env for static site
  ansible.builtin.template:
    src: env.j2
    dest: "/home/{{ paleo_user }}/paleo-ansible/docker/static/.env"
    owner: "{{ paleo_user }}"
    group: "{{ paleo_user }}"
    mode: '0640'

- name: Open firewall ports for HTTP and HTTPS
  ansible.posix.firewalld:
    port: "{{ item }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - "80"
    - "{{ paleo_host_port }}"

# MVP shortcut: VM builds its own image.
- name: Build static image on the target
  ansible.builtin.command:
    cmd: docker compose build
    chdir: "/home/{{ paleo_user }}/paleo-ansible/docker/static"
  changed_when: true

- name: Install paleo-static.service systemd unit
  ansible.builtin.template:
    src: paleo-static.service.j2
    dest: /etc/systemd/system/paleo-static.service
    owner: root
    group: root
    mode: '0644'

- name: Enable and start paleo-static.service
  ansible.builtin.service:
    name: paleo-static
    enabled: true
    state: started
    daemon_reload: true
