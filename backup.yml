---
# copyright Utrecht University
# On-demand backup of a Paleo site.
#
#   ansible-playbook backup.yml -e site=wordpress
#   ansible-playbook backup.yml -e site=static

- name: Validate arguments
  hosts: localhost
  gather_facts: false
  tasks:
    # Require an explicit site — no silent default. A rarely-exercised default
    # path rots (it once hid a recursive-var bug); explicit is self-documenting.
    - name: Require a valid site
      ansible.builtin.assert:
        that:
          - site is defined
          - site in ['wordpress', 'static']
        msg: "Pass -e site=wordpress or -e site=static"

- name: On-demand Paleo backup
  # default('') is only for syntax-check/templating; the validate play above
  # guarantees a real site before this play runs.
  hosts: "{{ site | default('') }}_sites"
  become: true
  vars:
    paleo_user: paleo
    paleo_backup_root: "/home/{{ paleo_user }}/paleo-backups"
  tasks:
    - name: Run backup.sh as the paleo user
      ansible.builtin.command:
        cmd: ./backup.sh
        chdir: "/home/{{ paleo_user }}/paleo-ansible/docker/{{ site }}"
      become: true
      become_user: "{{ paleo_user }}"
      environment:
        PALEO_BACKUP_ROOT: "{{ paleo_backup_root }}/{{ site }}"
      register: paleo_backup_out
      changed_when: true

    - name: Show backup output
      ansible.builtin.debug:
        var: paleo_backup_out.stdout_lines
